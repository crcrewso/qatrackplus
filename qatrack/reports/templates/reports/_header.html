{% load i18n %}
{% load static %}
{% load reports_tags %}

<style>
.logo-hidden {
  opacity: 0;
}
.logo-visible {
  opacity: 1;
}
.logo {
  max-height: 60px;
  margin-top: 20px;
  transition: opacity 0.2s;
}
</style>

<div class="row">
  <div class="col-xs-8">
    <h1 style="color:#777; margin-top: 20px; " class="pdf">{% trans "QATrack+ Reports" %}</h1>
    <h5 style="color: #1c9aea; font-weight: bold; padding-left: 4px;">{{ report_title }}</h5>
  </div>
  <div class="col-xs-4 text-right">
    {% if include_logo %}
      {% if for_pdf %}
        <!-- For PDF generation, use file:// path that Chrome can access -->
        <img src="file://{{ STATIC_ROOT }}/reports/img/logo.png" alt="{% trans 'Organization Logo' %}" class="logo logo-visible"/>
      {% else %}
        <!-- For HTML rendering, use normal static path -->
        <img src="{% static 'reports/img/logo.png' %}" alt="{% trans 'Organization Logo' %}" class="logo logo-visible"/>
      {% endif %}
    {% else %}
      <img src="{% if for_pdf %}file://{{ STATIC_ROOT }}/reports/img/logo.png{% else %}{% static 'reports/img/logo.png' %}{% endif %}" alt="{% trans 'Organization Logo' %}" class="logo logo-hidden"/>
    {% endif %}
  </div>
</div>

<div class="row">
  <div class="col-xs-12">
    <hr style="padding-top: 0; margin-top: 5px;" class="tight"/>
  </div>
</div>
