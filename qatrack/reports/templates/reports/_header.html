{% load i18n %}
{% load static %}
{% load reports_tags %}

<style>
.logo-hidden {
  opacity: 0;
}
.logo-visible {
  opacity: 1;
}
.logo {
  max-height: 60px;
  margin-top: 20px;
  transition: opacity 0.2s;
}
.logo-fallback-message {
  font-size: 12px;
  color: #777;
  font-style: italic;
  margin-top: 20px;
  text-align: right;
}
</style>

<div class="row">
  <div class="col-xs-8">
    <h1 style="color:#777; margin-top: 20px; " class="pdf">{% trans "QATrack+ Reports" %}</h1>
    <h5 style="color: #1c9aea; font-weight: bold; padding-left: 4px;">{{ report_title }}</h5>
  </div>
  <div class="col-xs-4 text-right">
    {% if include_logo %}
      {% if for_pdf %}
        <!-- For PDF generation, use file:// path that Chrome can access -->
        <img src="file://{{ STATIC_ROOT }}/reports/img/sca_logo.jpg" alt="Saskatchewan Cancer Agency" class="logo logo-visible" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"/>
        <div class="logo-fallback-message" style="display: none;">
          {% trans "Saskatchewan Cancer Agency" %}<br>
          <small>{% trans "(Logo not available in downloaded version)" %}</small>
        </div>
      {% else %}
        <!-- For HTML rendering, use normal static path -->
        <img src="{% static 'reports/img/sca_logo.jpg' %}" alt="Saskatchewan Cancer Agency" class="logo logo-visible"/>
      {% endif %}
    {% else %}
      <img src="{% if for_pdf %}file://{{ STATIC_ROOT }}/reports/img/sca_logo.jpg{% else %}{% static 'reports/img/sca_logo.jpg' %}{% endif %}" alt="Saskatchewan Cancer Agency" class="logo logo-hidden"/>
    {% endif %}
  </div>
</div>

<div class="row">
  <div class="col-xs-12">
    <hr style="padding-top: 0; margin-top: 5px;" class="tight"/>
  </div>
</div>
