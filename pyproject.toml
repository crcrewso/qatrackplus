[project]
name = "qatrackplus"
version = "3.1.1.4"
description = "Quality Assurance software for medical physicists"
authors = [
    {name = "Randy Taylor", email = "randy@multileaf.ca"},
]

dependencies = [
    "black==23.1.0",
    "Django==4.2",
    "django-q2>=1.8.0",
    "PyVirtualDisplay==2.0",
    "beautifulsoup4==4.9.3",
    "concurrent-log-handler==0.9.19",
    "coreapi==2.3.3",
    "coverage==5.4",
    "django-auth-adfs>=1.7.0",
    "django-braces>=1.17,<1.18",
    "django-contrib-comments>=2.2,<3.0",
    "django-coverage==1.2.4",
    "django-crispy-forms==1.14.0",
    "django-debug-toolbar>=4.0,<5.0",
    "django-dynamic-raw-id>=4.0",
    "django-extensions==3.1.0",
    "django-filter>=23.0",
    "django-formtools==2.5.1",
    "django-listable==0.9.0",
    "django-mptt==0.13.4",
    "django-mptt-admin>=2.0",
    "django-picklefield>=3.1",
    "django-registration>=3.2",
    "djangorestframework>=3.14.0",
    "djangorestframework-filters>=1.0.0.dev2",
    "django-widget-tweaks>=1.5.0",
    "freezegun==0.3.15",
    "html5lib==1.1",
    "markdown==3.3.3",
    "matplotlib==3.3.4",
    "numpy==1.19.5",
    "openpyxl==3.0.6",
    "pandas<=1.1.5",
    "pep8==1.7.1",
    "Pillow==8.1.0",
    "pydicom==2.1.2",
    "pylinac<3.20",
    "pynliner==0.8.0",
    "pytest-cov==2.11.1",
    "pytest-django==4.1.0",
    "pytest-sugar==0.9.4",
    "pytest==6.2.2",
    "python-dateutil==2.8.1",
    "pytz==2021.1",
    "reportlab==3.5.59",
    "requests<=3",
    "scipy<=1.5.4",
    "selenium==3.141.0",
    "setuptools>=65.0",
    "urllib3>=1.25.11,<2.0",
    "xlrd==2.0.1",
    "XlsxWriter==1.3.7",
    "django-recurrence>=1.11.0",
    "django-sql-explorer>=5.3",
    "django-upgrade>=1.25.0",
    "pre-commit>=4.2.0",
    "fabric>=2.6.0",
]

[project.optional-dependencies]
dev = [
    "Jinja2==3.1.2",
    "Sphinx==7.4.7",
    "flake8",
    "ipdb",
    "ipython",
    "isort",
    "pylint>=2.12,<3.0",
    "sphinx-autobuild==0.7.1",
    "sphinx-rtd-theme==3.0.2",
    "sphinxcontrib-applehelp==1.0.4",
    "sphinxcontrib-devhelp==1.0.2",
    "sphinxcontrib-htmlhelp==2.0.1",
    "sphinxcontrib-jquery==4.1",
    "sphinxcontrib-jsmath==1.0.1",
    "sphinxcontrib-qthelp==1.0.3",
    "sphinxcontrib-serializinghtml==2.0.0",
    "sphinxcontrib-websupport==1.2.4",
    "yapf",
]

mysql = [
    "mysqlclient==2.0.3",
]

postgres = [
    "psycopg2-binary==2.8.6",
]

win = [
    "CherryPy==18.0.1",
    "pyreadline",
    "pywin32>=300",
]

docker = [
    "gunicorn==19.9.0",
]

[project.urls]
Homepage = "https://qatrackplus.com"
Documentation = "https://docs.qatrackplus.com"
Repository = "https://github.com/qatrackplus/qatrackplus"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["qatrack"]

[tool.pytest.ini_options]
testpaths = ["qatrack"]
norecursedirs = [
    "*.egg",
    ".eggs",
    "dist",
    "build",
    "docs",
    ".tox",
    ".git",
    "__pycache__",
    ".venv",
    "venv"
]
python_files = ["test_*.py", "*_test.py"]
addopts = "-ra -q"
django_find_project = true
DJANGO_SETTINGS_MODULE = "qatrack.settings"
