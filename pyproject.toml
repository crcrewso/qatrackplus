[project]
name = "qatrack"
version = "3.2.0.alpha.1"
description = "QATrack+ website"
authors = [{ name = "Ottawa General Hospital Cancer Center" }]
license = { text = "The MIT License" }
readme = "README.md"
requires-python = ">=3.9, <3.11"
package-mode = false
dependencies = [
    "black (>=23.1,<24.0)",
    "concurrent-log-handler (>=0.9,<0.10)",
    "django (==3.2)",
    "django-admin-views (<1)",
    "django-auth-adfs (>=1.10,<1.11)",
    "django-braces (>=1.17,<1.18)",
    "django-contrib-comments (>=2.2,<2.3)",
    "django-debug-toolbar (<4.4)",
    "django-dynamic-raw-id (>=3,<4)",
    "django-extensions (>=3.2,<3.3)",
    "django-filter (>=2.4,<2.5)",
    "django-form-utils (>=1.0,<2.0)",
    "django-formtools (>=2.5,<2.6)",
    "django-listable (>=0.8,<0.9)",
    "django-mptt (>=0.16,<0.17)",
    "django-mptt-admin (>=2.6,<2.7)",
    "django-q (>=1.3,<1.4)",
    "django-recurrence (>=1.11,<1.12)",
    "django-registration (<4)",
    "django-utils-six (>=2,<3)",
    "django-widget-tweaks (>=1.5,<1.6)",
    "djangorestframework (>=3.14,<3.15)",
    "djangorestframework-filters (==1.0.0.dev0)",
    "freezegun (>=0.3,<0.4)",
    "imageio (>=2.9,<3.0)",
    "matplotlib (>=3.3,<3.6)",
    "matplotlib-inline (>=0.1.7,<0.2.0)",
    "multiprocess (>=0.70.18,<0.71.0)",
    "numpy (<2)",
    "pandas (<2)",
    "pydicom (>=2.1,<3.0)",
    "pynliner (>=0.8,<0.9)",
    "scipy (>=1.5,<1.8)",
    "urllib3 (<2)",
    "xlsxwriter (>=1.3,<2.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
markers = [
    "selenium: marks tests that use django live test case and web browser",
]
DJANGO_SETTINGS_MODULE = "qatrack.test_settings"

[tool.poetry.group.win.dependencies]
cherrypy = "~18.0"
pywin32 = ">=300"


[tool.poetry.group.dev.dependencies]
coverage = "^7"
django-coverage = "^1.2"
pytest = "^7"
pytest-cov = "^2.11"
pytest-django = "^4.7"
pytest-sugar = "^0.9"
selenium = "^4.1"
sniffio = "^1.3"
sphinx = "^7.4"


[tool.poetry.group.unsure.dependencies]
exceptiongroup = "^1.2"
