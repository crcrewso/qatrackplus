[project]
name = "qatrack"
version = "3.1.1.5"
description = "QATrack+ website"
authors = [
    {name = "Ottawa General Hospital Cancer Center"}
]
license = {text = "The MIT License"}
readme = "README.md"
requires-python = ">=3.9, <3.11"
dependencies = [
    "black (>=23.1,<24.0)",
    "concurrent-log-handler (>=0.9,<0.10)",
    "django (==2.2.18)",
    "django-admin-views (<1)",
    "django-auth-adfs (>=1.10,<1.11)",
    "django-braces (>=1.13,<1.14)",
    "django-contrib-comments (>=1.8,<1.9)",
    "django-debug-toolbar (<4.4)",
    "django-dynamic-raw-id (>=2.8,<2.9)",
    "django-extensions (>=3.1,<3.2)",
    "django-filter (>=2.4,<2.5)",
    "django-form-utils (>=1.0,<2.0)",
    "django-formtools (>=2.1,<2.2)",
    "django-listable (>=0.5,<0.6)",
    "django-mptt (>=0.10,<0.11)",
    "django-mptt-admin (>=0.7,<0.8)",
    "django-q (>=1.3,<1.4)",
    "django-recurrence (>=1.9,<1.10)",
    "django-registration (>=3.1,<3.2)",
    "django-widget-tweaks (>=1.4,<1.5)",
    "djangorestframework (>=3.12,<3.13)",
    "djangorestframework-filters (==1.0.0.dev0)",
    "freezegun (>=0.3,<0.4)",
    "imageio (>=2.9,<3.0)",
    "matplotlib (>=3.3,<3.4)",
    "matplotlib-inline (>=0.1.7,<0.2.0)",
    "multiprocess (>=0.70.18,<0.71.0)",
    "pandas (>=1.1,<1.2)",
    "pydicom (>=2.1,<3.0)",
    "pynliner (>=0.8,<0.9)",
    "scipy (>=1.5,<1.6)",
    "urllib3 (<2)",
    "xlsxwriter (>=1.3,<2.0)"
]



[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
markers = [
    "selenium: marks tests that use django live test case and web browser", 
]
DJANGO_SETTINGS_MODULE = "qatrack.test_settings"

[tool.poetry.group.win.dependencies]
cherrypy = "~18.0"
pywin32 = ">=300"


[tool.poetry.group.dev.dependencies]
django-coverage = "^1.2"
pytest = "^6.2"
pytest-cov = "^2.11"
pytest-django = "^4.1"
pytest-sugar = "^0.9"
selenium = "^4.1"
sniffio = "^1.3"
sphinx = "^7.4"




[tool.poetry.group.unsure.dependencies]
exceptiongroup = "^1.2"

