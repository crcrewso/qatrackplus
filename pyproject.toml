[project]
=======
name = "qatrack"
version = "3.2.0.alpha.1"
description = "QATrack+ website"
authors = [{ name = "Ottawa General Hospital Cancer Center" }]
license = { text = "The MIT License" }
readme = "README.md"
requires-python = ">=3.10, <3.11"
package-mode = false
dependencies = [
    "black (>=23.1,<24.0)",
    "concurrent-log-handler (>=0.9,<0.10)",
    "django (>=3.2.0,<3.3)",
    "django-auth-adfs (>=1.10,<1.11)",
    "django-braces (>=1.17,<1.18)",
    "django-contrib-comments (>=2.2,<2.3)",
    "django-crispy-forms (>=1.14,<2.0)",
    "django-debug-toolbar (>=3.2,<4.0)",
    "django-dynamic-raw-id (>=2.8,<3.0)",
    "django-extensions (>=3.2,<3.3)",
    "django-filter (>=21.1,<22.0)",
    "django-formtools (>=2.5,<2.6)",
    "django-listable (>=0.8,<0.9)",
    "django-mptt (>=0.13.4,<1.0)",
    "django-mptt-admin (>=2.6,<2.7)",
    "django-q (>=1.3,<1.4)",
    "django-recurrence (>=1.11,<1.12)",
    "django-registration (<4)",
    "django-utils-six (>=2,<3)",
    "django-widget-tweaks (>=1.5,<1.6)",
    "djangorestframework (>=3.14.0,<3.15)",
    "djangorestframework-filters (==1.0.0.dev0)",
    "freezegun (>=0.3,<0.4)",
    "imageio (>=2.9,<3.0)",
    "matplotlib (>=3.3,<3.6)",
    "matplotlib-inline (>=0.1.7,<0.2.0)",
    "multiprocess (>=0.70.18,<0.71.0)",
    "numpy (<2)",
    "pandas (<2)",
    "pydicom (>=2.1,<3.0)",
    "pynliner (>=0.8,<0.9)",
    "scipy (<=1.13)",
    "selenium (>=3.141.0,<4.0)",
    "urllib3 (>=1.25.11,<2.0)",
    "xlsxwriter (>=1.3,<2.0)",
    "xlrd (>=2.0.0,<3.0)",
    "XlsxWriter (>=1.3.0,<2.0)",
    "setuptools>=80.9.0",
    "pytest>=8.4.1",
    "pytest-django>=4.11.1",
]

[project.optional-dependencies]
dev = [
    "Jinja2==3.1.2",
    "Sphinx==7.4.7",
    "flake8",
    "ipdb",
    "ipython",
    "isort",
    "pylint>=2.12,<3.0",
    "sphinx-autobuild==0.7.1",
    "sphinx-rtd-theme==3.0.2",
    "sphinxcontrib-applehelp==1.0.4",
    "sphinxcontrib-devhelp==1.0.2",
    "sphinxcontrib-htmlhelp==2.0.1",
    "sphinxcontrib-jquery==4.1",
    "sphinxcontrib-jsmath==1.0.1",
    "sphinxcontrib-qthelp==1.0.3",
    "sphinxcontrib-serializinghtml==2.0.0",
    "sphinxcontrib-websupport==1.2.4",
    "yapf",
]
mysql = [
    "mysqlclient==2.0.3",
]

postgres = [
    "psycopg2-binary==2.8.6",
]
win = [
    "CherryPy==18.0.1",
    "pyreadline",
    "pywin32>=300",
    "mssql-django>=1.5",

]

docker = [
    "gunicorn==19.9.0",
]

[project.urls]
Homepage = "https://qatrackplus.com"
Documentation = "https://docs.qatrackplus.com"
Repository = "https://github.com/qatrackplus/qatrackplus"

[tool.pytest.ini_options]
testpaths = ["qatrack"]
norecursedirs = [
    "*.egg",
    ".eggs",
    "dist",
    "build",
    "docs",
    ".tox",
    ".git",
    "__pycache__",
    ".venv",
    "venv"
]
python_files = ["test_*.py", "*_test.py"]
addopts = "-ra -q"
django_find_project = true
DJANGO_SETTINGS_MODULE = "qatrack.settings"
