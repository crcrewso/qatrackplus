# =============================================================================
# QATrack+ Apache 2.4 Configuration — Linux (mod_wsgi daemon mode)
# =============================================================================
#
# Prerequisites:
#   sudo apt install apache2 libapache2-mod-wsgi-py3   # Debian/Ubuntu
#   sudo dnf install httpd python3-mod_wsgi             # RHEL/CentOS/Rocky
#   sudo a2enmod wsgi headers
#
# Customise every path that contains YOURUSERNAMEHERE and YOUR_HOSTNAME_HERE
# before enabling this file:
#
#   sudo cp apache24_linux.conf /etc/apache2/sites-available/qatrackplus.conf
#   sudo a2ensite qatrackplus
#   sudo systemctl reload apache2
# =============================================================================

# Prevent mod_wsgi from running in embedded mode (daemon mode only)
WSGIRestrictEmbedded On

# ---------------------------------------------------------------------------
# HTTP — redirect all plain HTTP traffic to HTTPS
# ---------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName YOUR_HOSTNAME_HERE
    Redirect permanent / https://YOUR_HOSTNAME_HERE/
</VirtualHost>

# ---------------------------------------------------------------------------
# HTTPS — main virtual host
# ---------------------------------------------------------------------------
<VirtualHost *:443>

    ServerName YOUR_HOSTNAME_HERE
    ServerAdmin admin@YOUR_HOSTNAME_HERE

    # ----- TLS ---------------------------------------------------------------
    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/YOUR_HOSTNAME_HERE.crt
    SSLCertificateKeyFile   /etc/ssl/private/YOUR_HOSTNAME_HERE.key
    # SSLCertificateChainFile /etc/ssl/certs/chain.pem   # uncomment if needed

    # Modern TLS settings (adjust to your organisation's policy)
    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # ----- Security headers --------------------------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Tell Django it is sitting behind HTTPS
    RequestHeader set X-Forwarded-Proto "https"

    # ----- Logging -----------------------------------------------------------
    # Suppress noisy health-check pings from logs
    SetEnvIf Request_URI "^(.*)/accounts/ping/$" dontlog

    ErrorLog  ${APACHE_LOG_DIR}/qatrackplus_error.log
    CustomLog ${APACHE_LOG_DIR}/qatrackplus_access.log combined env=!dontlog

    # ----- Static / media files (served directly by Apache) -----------------
    # Adjust paths to match your actual install directory.

    Alias /static /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/static
    <Directory /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/static>
        Require all granted
        Options -Indexes
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </Directory>

    Alias /media /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/media
    <Directory /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/media>
        Require all granted
        Options -Indexes
    </Directory>

    # ----- WSGI application --------------------------------------------------
    <Directory /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # python-home  → virtualenv root (contains bin/python)
    # python-path  → project root (the directory that contains manage.py)
    WSGIDaemonProcess qatrackplus \
        user=www-data \
        group=www-data \
        processes=2 \
        threads=15 \
        python-home=/home/YOURUSERNAMEHERE/venvs/qatrackplus \
        python-path=/home/YOURUSERNAMEHERE/web/qatrackplus \
        display-name=%{GROUP}

    WSGIProcessGroup  qatrackplus
    WSGIPassAuthorization On

    # Root URL hosting (default). Comment out and use the next line for sub-path.
    WSGIScriptAlias / /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/wsgi.py \
        process-group=qatrackplus application-group=%{GLOBAL}

    # Sub-path hosting — uncomment and adjust FORCE_SCRIPT_NAME in local_settings.py
    # WSGIScriptAlias /qatrackplus /home/YOURUSERNAMEHERE/web/qatrackplus/qatrack/wsgi.py \
    #     process-group=qatrackplus application-group=%{GLOBAL}

</VirtualHost>
