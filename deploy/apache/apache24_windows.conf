# =============================================================================
# QATrack+ Apache 2.4 Configuration — Windows (mod_wsgi daemon mode)
# =============================================================================
#
# This config replaces the CherryPy-based Windows deployment with a
# production-grade Apache / mod_wsgi stack.
#
# Prerequisites (install in this order):
#   1. Apache 2.4 for Windows  — https://www.apachelounge.com/download/
#      (choose the VS17/x64 build that matches your OS)
#   2. mod_wsgi wheel matched to your Python version:
#         pip install mod_wsgi
#      Then register the module:
#         mod_wsgi-express module-config
#      Copy the two output lines (LoadFile / LoadModule) into httpd.conf
#      BEFORE the Include for this file.
#
# Typical locations assumed below:
#   Apache install   : C:\Apache24
#   Project root     : C:\web\qatrackplus          (contains manage.py)
#   Virtualenv root  : C:\venvs\qatrackplus        (contains Scripts\python.exe)
#   Logs             : C:\Apache24\logs
#
# Adjust every path that contains YOURUSERNAMEHERE / YOUR_HOSTNAME_HERE before use.
#
# To enable, add this line to C:\Apache24\conf\httpd.conf:
#   Include conf/extra/qatrackplus.conf
# =============================================================================

# Prevent mod_wsgi from running in embedded mode
WSGIRestrictEmbedded On

# ---------------------------------------------------------------------------
# HTTP — redirect all plain HTTP traffic to HTTPS
# ---------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName YOUR_HOSTNAME_HERE
    Redirect permanent / https://YOUR_HOSTNAME_HERE/
</VirtualHost>

# ---------------------------------------------------------------------------
# HTTPS — main virtual host
# ---------------------------------------------------------------------------
<VirtualHost *:443>

    ServerName YOUR_HOSTNAME_HERE
    ServerAdmin admin@YOUR_HOSTNAME_HERE

    # ----- TLS ---------------------------------------------------------------
    SSLEngine on

    # Paths to your certificate files (PEM format).
    # For a self-signed cert during testing, generate with:
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048
    #     -keyout C:\Apache24\conf\ssl\server.key
    #     -out    C:\Apache24\conf\ssl\server.crt
    SSLCertificateFile    "C:/Apache24/conf/ssl/YOUR_HOSTNAME_HERE.crt"
    SSLCertificateKeyFile "C:/Apache24/conf/ssl/YOUR_HOSTNAME_HERE.key"
    # SSLCertificateChainFile "C:/Apache24/conf/ssl/chain.pem"

    SSLProtocol             all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     off
    SSLSessionTickets       off

    # ----- Security headers --------------------------------------------------
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Tell Django the upstream connection is HTTPS
    RequestHeader set X-Forwarded-Proto "https"

    # ----- Logging -----------------------------------------------------------
    SetEnvIf Request_URI "^(.*)/accounts/ping/$" dontlog

    ErrorLog  "C:/Apache24/logs/qatrackplus_error.log"
    CustomLog "C:/Apache24/logs/qatrackplus_access.log" combined env=!dontlog

    # ----- Static / media files (served directly by Apache) -----------------
    # On Windows, forward slashes work in Apache even for Windows paths.

    Alias /static "C:/web/qatrackplus/qatrack/static"
    <Directory "C:/web/qatrackplus/qatrack/static">
        Require all granted
        Options -Indexes
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
    </Directory>

    Alias /media "C:/web/qatrackplus/qatrack/media"
    <Directory "C:/web/qatrackplus/qatrack/media">
        Require all granted
        Options -Indexes
    </Directory>

    # ----- WSGI application --------------------------------------------------
    <Directory "C:/web/qatrackplus/qatrack">
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # python-home  → virtualenv root (must contain Scripts\python.exe)
    # python-path  → project root   (directory that contains manage.py / qatrack/)
    #
    # NOTE: mod_wsgi daemon mode is not supported on Windows.
    #       Use WSGIScriptAlias without WSGIDaemonProcess instead.
    #       For process isolation on Windows, run a Waitress service behind
    #       an Apache reverse proxy (see the commented section at the bottom).

    WSGIPassAuthorization On

    # Root URL hosting (default).
    WSGIScriptAlias / "C:/web/qatrackplus/qatrack/wsgi.py"

    # Sub-path hosting — uncomment and set FORCE_SCRIPT_NAME in local_settings.py
    # WSGIScriptAlias /qatrackplus "C:/web/qatrackplus/qatrack/wsgi.py"

    # Embedded-mode interpreter settings (Windows mod_wsgi only).
    # Adjust python-home to point to your venv.
    <Location />
        SetEnv DJANGO_SETTINGS_MODULE qatrack.settings
    </Location>

</VirtualHost>

# =============================================================================
# ALTERNATIVE: Apache as reverse proxy to a Waitress WSGI server
# =============================================================================
# If you prefer process isolation without mod_wsgi on Windows, run Waitress
# as a Windows Service (e.g. via NSSM) and have Apache reverse-proxy to it.
#
# 1. Install Waitress:        pip install waitress
# 2. Run / install as service, binding to 127.0.0.1:8030:
#       waitress-serve --host=127.0.0.1 --port=8030 qatrack.wsgi:application
# 3. Enable Apache modules:   LoadModule proxy_module ...
#                              LoadModule proxy_http_module ...
#
# Uncomment the block below and remove the WSGIScriptAlias above.
# -----------------------------------------------------------------------------
# ProxyPreserveHost On
# ProxyPass        /static !
# ProxyPass        /media  !
# ProxyPass        / http://127.0.0.1:8030/
# ProxyPassReverse / http://127.0.0.1:8030/
